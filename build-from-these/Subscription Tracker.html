  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #070a14;
      --bg2:      #0c1020;
      --surface:  rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.13);
      --text:     rgba(255,255,255,0.92);
      --text2:    rgba(255,255,255,0.52);
      --text3:    rgba(255,255,255,0.26);
      --accent:   #7c6ef7;
      --accent2:  #4facfe;
      --accentbg: rgba(124,110,247,0.14);
      --green:    #22c55e; --greenbg: rgba(34,197,94,0.12);
      --amber:    #f59e0b; --amberbg: rgba(245,158,11,0.12);
      --red:      #ef4444; --redbg:   rgba(239,68,68,0.12);
      --blue:     #60a5fa; --bluebg:  rgba(96,165,250,0.12);
      --sw: 232px;
      --th: 60px;
      --r: 14px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 55% 60% at 12% 50%, rgba(124,110,247,0.09) 0%, transparent 100%),
        radial-gradient(ellipse 45% 40% at 88% 18%, rgba(79,172,254,0.07) 0%, transparent 100%);
      color: var(--text);
    }

    #root { height: 100vh; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .glass {
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }
    .glass-dark {
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
    }
    .grad-text {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 100px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
    }
    .badge-active   { background: var(--greenbg); color: var(--green); }
    .badge-paused   { background: var(--amberbg); color: var(--amber); }
    .badge-cancelled{ background: var(--redbg);   color: var(--red); }
    .badge-blue     { background: var(--bluebg);  color: var(--blue); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; border: none; transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-primary:hover { opacity: 0.86; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,110,247,0.3); }
    .btn-ghost { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
    .btn-danger { background: var(--redbg); color: var(--red); border: 1px solid rgba(239,68,68,0.22); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-sm { padding: 5px 11px; font-size: 11.5px; }

    .input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 13px;
      color: var(--text); font-family: inherit; font-size: 13px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,110,247,0.15); }
    .input::placeholder { color: var(--text3); }
    select.input { appearance: none; cursor: pointer; }

    .app-layout { display: flex; height: 100vh; overflow: hidden; }

    .sidebar {
      width: var(--sw); height: 100vh; flex-shrink: 0;
      display: flex; flex-direction: column;
      padding: 18px 10px; border-right: 1px solid var(--border);
      background: rgba(255,255,255,0.018);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    }

    .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    .topbar {
      height: var(--th); flex-shrink: 0;
      display: flex; align-items: center; gap: 12px; padding: 0 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,10,20,0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    }

    .page-content { flex: 1; overflow-y: auto; padding: 24px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      font-size: 13.5px; font-weight: 500; color: var(--text2);
      cursor: pointer; transition: all 0.15s ease;
      border: 1px solid transparent; user-select: none;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accentbg); color: var(--accent); border-color: rgba(124,110,247,0.2); }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px;
      transition: all 0.15s ease;
    }
    .stat-card:hover { background: var(--surface2); border-color: var(--border2); transform: translateY(-1px); }

    .sub-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px;
      transition: all 0.18s ease; cursor: pointer;
    }
    .sub-card:hover {
      background: var(--surface2); border-color: var(--border2);
      transform: translateY(-2px); box-shadow: 0 10px 36px rgba(0,0,0,0.28);
    }

    .seg-control {
      display: flex; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px;
    }
    .seg-btn {
      padding: 6px 13px; border-radius: 7px;
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      border: none; font-family: inherit; color: var(--text2);
      background: transparent; transition: all 0.14s; white-space: nowrap;
    }
    .seg-btn.on { background: rgba(124,110,247,0.2); color: var(--accent); }
    .seg-btn:not(.on):hover { background: var(--surface2); color: var(--text); }

    .pbar { height: 4px; background: rgba(255,255,255,0.07); border-radius: 100px; overflow: hidden; }
    .pbar-fill { height: 100%; border-radius: 100px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.62); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: #0e1224; border: 1px solid var(--border2);
      border-radius: 20px; padding: 28px; width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
      animation: fadeInUp 0.22s ease both;
    }

    .drawer {
      position: fixed; top: 0; right: 0;
      width: 380px; height: 100vh; z-index: 200;
      background: #0e1224; border-left: 1px solid var(--border2);
      transform: translateX(100%); transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto; padding: 24px;
    }
    .drawer.open { transform: translateX(0); box-shadow: -24px 0 60px rgba(0,0,0,0.4); }

    .toggle-wrap {
      width: 40px; height: 22px; border-radius: 100px; cursor: pointer;
      background: rgba(255,255,255,0.1); border: 1px solid var(--border2);
      position: relative; transition: background 0.2s;
    }
    .toggle-wrap.on { background: var(--accentbg); border-color: rgba(124,110,247,0.35); }
    .toggle-knob {
      position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--text3); transition: transform 0.2s, background 0.2s;
    }
    .toggle-wrap.on .toggle-knob { transform: translateX(18px); background: var(--accent); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ani { animation: fadeInUp 0.28s ease both; }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 11px 20px; background: #fff; color: #1a1a1a;
      border: none; border-radius: 11px; font-family: inherit;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .google-btn:hover { background: #f0f0f0; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,0.25); }

    .timeline-line {
      position: absolute; left: 17px; top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }

    /* Tweaks panel */
    .tweaks-panel {
      position: fixed; bottom: 20px; right: 20px; z-index: 500;
      width: 240px; background: #0e1224;
      border: 1px solid var(--border2); border-radius: 16px; padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeInUp 0.2s ease both;
    }
    .color-swatch {
      width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s;
    }
    .color-swatch:hover { transform: scale(1.12); }
    .color-swatch.selected { border-color: white; }
  </style>
</head>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#84cc16",
  "startOnDashboard": false
}/*EDITMODE-END*/;

const ACCENTS = [
  { label:"Purple", c:"#7c6ef7", c2:"#4facfe" },
  { label:"Rose",   c:"#f43f5e", c2:"#fb923c" },
  { label:"Teal",   c:"#14b8a6", c2:"#60a5fa" },
  { label:"Lime",   c:"#84cc16", c2:"#22c55e" },
];

function TweaksPanel({ tweaks, setTweak, onClose }) {
  return (
    <div className="tweaks-panel">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <span style={{ fontWeight:700, fontSize:13 }}>Tweaks</span>
        <button className="btn btn-ghost btn-sm" style={{padding:'4px 8px'}} onClick={onClose}>
          <window.Icon name="x" size={12} />
        </button>
      </div>
      <div style={{ fontSize:11, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.7px', fontWeight:700, marginBottom:8 }}>Accent Color</div>
      <div style={{ display:'flex', gap:8, marginBottom:16 }}>
        {ACCENTS.map(a => (
          <div key={a.label} className={`color-swatch ${tweaks.accentColor===a.c?'selected':''}`}
            style={{ background:`linear-gradient(135deg,${a.c},${a.c2})` }}
            title={a.label}
            onClick={() => {
              setTweak('accentColor', a.c);
              document.documentElement.style.setProperty('--accent', a.c);
              document.documentElement.style.setProperty('--accent2', a.c2);
              document.documentElement.style.setProperty('--accentbg', a.c + '22');
            }}
          />
        ))}
      </div>
      <div style={{ fontSize:11, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.7px', fontWeight:700, marginBottom:8 }}>Start Page</div>
      <div className="seg-control" style={{ width:'100%' }}>
        <button className={`seg-btn ${!tweaks.startOnDashboard?'on':''}`} style={{flex:1,justifyContent:'center'}}
          onClick={() => setTweak('startOnDashboard', false)}>Login</button>
        <button className={`seg-btn ${tweaks.startOnDashboard?'on':''}`} style={{flex:1,justifyContent:'center'}}
          onClick={() => setTweak('startOnDashboard', true)}>Dashboard</button>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [page, setPage] = useState(TWEAK_DEFAULTS.startOnDashboard ? 'dashboard' : 'landing');

  function setTweak(key, val) {
    const next = { ...tweaks, [key]: val };
    setTweaksState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const { LandingPage, AppShell } = window;

  return (
    <>
      {page === 'landing'
        ? <LandingPage onLogin={() => setPage('dashboard')} />
        : <AppShell currentPage={page} onNavigate={setPage} />
      }
      {showTweaks && (
        <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => {
          setShowTweaks(false);
          window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
        }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
